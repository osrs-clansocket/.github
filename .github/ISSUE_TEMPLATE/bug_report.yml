name: Bug report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please search existing issues first.
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - Dashboard (clansocket.com)
        - RuneLite plugin
        - Discord bot
        - Voxlab (3D icons)
        - Cache extractor
        - Error pages
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Plugin version, RuneLite version, and/or browser — whatever applies.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Logs / screenshots
      description: Anything else that helps — console output, screenshots.
    validations:
      required: false
