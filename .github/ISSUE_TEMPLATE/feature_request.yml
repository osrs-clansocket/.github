name: Feature request
description: Suggest an improvement or new capability.
labels: ["enhancement"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - Dashboard (clansocket.com)
        - RuneLite plugin
        - Discord bot
        - Voxlab (3D icons)
        - Cache extractor
        - Error pages
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
